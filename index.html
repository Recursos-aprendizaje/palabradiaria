<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Generador de Palabra Diaria</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,700&family=Montserrat:wght@400;600;700;800&family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #0b0f19;
            --bg-card: #131a2a;
            --btn-cyan: #00f2ac;
            --btn-blue: #1d4ed8;
            --text-main: #ffffff;
            --text-muted: #8b95a5;
            --border: #1e293b;
            --gold: #d4af37;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Montserrat', sans-serif; background: var(--bg-main); color: var(--text-main); padding-bottom: 60px; }

        /* PREVIEW CARD */
        #preview-wrap { width: 100%; max-width: 430px; margin: 0 auto; background: #000; display: flex; justify-content: center; }
        #verse-card { width: 100%; aspect-ratio: 9/16; max-height: 600px; position: relative; background-size: cover; background-position: center; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 35px; background-color: #111; }
        .overlay { position: absolute; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.5); z-index: 1; }
        .card-content { z-index: 2; width: 100%; }
        .v-text { font-family: 'Playfair Display', serif; font-size: 26px; font-style: italic; line-height: 1.4; margin-bottom: 25px; text-shadow: 2px 2px 10px rgba(0,0,0,0.9); }
        .v-ref { font-family: 'Cinzel', serif; color: var(--gold); font-size: 18px; letter-spacing: 3px; text-shadow: 1px 1px 5px rgba(0,0,0,0.9); text-transform: uppercase; }
        .font-arial .v-text { font-family: 'Arial Black', Arial, sans-serif; font-style: normal; font-weight: 900; font-size: 22px; }

        /* CONTROLES APP */
        .app-container { max-width: 430px; margin: 0 auto; padding: 20px; }
        
        .btn-save { width: 100%; padding: 16px; background: var(--btn-cyan); color: #000; font-weight: 800; font-size: 14px; border: none; cursor: pointer; text-transform: uppercase; margin-bottom: 20px; border-radius: 6px; letter-spacing: 1px; }
        
        .ver-tabs { display: flex; border-bottom: 2px solid var(--border); margin-bottom: 20px; }
        .ver-tab { flex: 1; text-align: center; padding: 15px; font-weight: 800; color: var(--text-muted); cursor: pointer; text-transform: uppercase; border-bottom: 3px solid transparent; font-size: 12px; transition: 0.3s; margin-bottom: -2px; }
        .ver-tab.active { color: var(--btn-blue); border-bottom-color: var(--btn-blue); }

        .section-title { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; font-weight: 800; }

        /* ESTILOS DE SELECTORES MODERNOS */
        select { 
            width: 100%; 
            padding: 14px 16px; 
            background-color: var(--bg-card); 
            border: 1px solid var(--border); 
            color: #fff; 
            font-family: 'Montserrat', sans-serif; 
            font-size: 13px; 
            font-weight: 700; 
            border-radius: 8px; 
            margin-bottom: 20px; 
            outline: none; 
            appearance: none; 
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 1rem center;
            background-size: 1em;
            cursor: pointer;
        }

        /* BOTÓN DE IMAGEN PERSONALIZADA */
        .custom-upload-btn {
            display: block;
            width: 100%;
            padding: 14px 16px;
            background-color: rgba(0, 242, 172, 0.05);
            border: 2px dashed var(--btn-cyan);
            color: var(--btn-cyan);
            font-family: 'Montserrat', sans-serif;
            font-size: 13px;
            font-weight: 700;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            margin-bottom: 20px;
            transition: 0.3s;
        }
        .custom-upload-btn:active { background-color: rgba(0, 242, 172, 0.2); }

        .settings-card { border-top: 1px solid var(--border); padding-top: 20px; margin-bottom: 30px; }
        .slider-wrap { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
        input[type="range"] { width: 100%; margin: 0 15px; accent-color: var(--btn-cyan); }

        .verse-list { display: flex; flex-direction: column; gap: 10px; }
        .verse-item { background: var(--bg-card); padding: 15px; border-radius: 8px; border-left: 3px solid transparent; cursor: pointer; transition: 0.3s; border: 1px solid var(--border); }
        .verse-item.active { border-left: 3px solid var(--btn-cyan); border-color: var(--btn-cyan); }
        .verse-item.sent { opacity: 0.6; }
        .verse-ref { font-weight: 800; color: var(--btn-cyan); font-size: 11px; margin-bottom: 8px; display: flex; justify-content: space-between; }
        .verse-text { font-size: 12px; color: var(--text-muted); line-height: 1.5; font-weight: 500; }
        .sent-mark { color: var(--gold); font-size: 10px; }

        .manual-box { display: none; background: var(--bg-card); padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        textarea, input[type="text"] { width: 100%; background: #0b0f19; border: 1px solid var(--border); color: #fff; padding: 12px; font-family: 'Montserrat'; font-size: 13px; margin-bottom: 10px; border-radius: 6px; resize: none; }
        .btn-apply { background: var(--btn-blue); color: white; border: none; padding: 12px; width: 100%; border-radius: 6px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="preview-wrap">
    <div id="verse-card">
        <div class="overlay" id="overlay-bg"></div>
        <div class="card-content">
            <div class="v-text" id="display-text">"La paz os dejo, mi paz os doy..."</div>
            <div class="v-ref" id="display-ref">JUAN 14:27</div>
        </div>
    </div>
</div>

<div class="app-container">
    <button class="btn-save" onclick="downloadImage()">↓ GUARDAR IMAGEN</button>

    <div class="ver-tabs">
        <div class="ver-tab active" onclick="setVersion('RVR1960', this)">REINA VALERA 1960</div>
        <div class="ver-tab" onclick="setVersion('NVI', this)">NVI</div>
    </div>

    <!-- SELECTOR DE CATEGORÍAS -->
    <div class="section-title">CATEGORÍA BÍBLICA</div>
    <select id="catSelect" onchange="setCat(this.value)">
        <option value="paz">Paz</option>
        <option value="confianza">Confianza</option>
        <option value="amor">Amor</option>
        <option value="fortaleza">Fortaleza</option>
        <option value="conyuges">Cónyuges</option>
    </select>

    <!-- SELECTOR DE TEMÁTICA -->
    <div class="section-title">TEMÁTICA DE FONDO</div>
    <select id="themeSelect" onchange="setTheme(this.value)">
        <option value="motores">🏎️ Motores</option>
        <option value="naturaleza">🌿 Naturaleza</option>
        <option value="ciudad">🌆 Ciudad</option>
        <option value="personalizada">🖼️ Imagen Personalizada</option> <!-- NUEVA OPCIÓN -->
    </select>

    <!-- SELECTOR DE IMÁGENES / CARGA -->
    <div class="section-title" id="imgTitle">SELECCIONAR IMAGEN</div>
    
    <!-- Este select se muestra para categorías predefinidas -->
    <select id="imgSelect" onchange="selectImageFromDropdown(this.value)">
        <!-- Se llena dinámicamente -->
    </select>

    <!-- Este botón se muestra SOLO cuando eligen "Imagen Personalizada" -->
    <div id="customImgWrap" style="display: none;">
        <label for="customInput" class="custom-upload-btn">
            + SUBIR FOTO DESDE GALERÍA
        </label>
        <input type="file" id="customInput" accept="image/*" style="display: none;" onchange="loadCustomImage(event)">
    </div>

    <div class="settings-card">
        <div class="section-title">AJUSTES VISUALES</div>
        <div class="slider-wrap">
            <span style="font-size:11px; color:var(--text-main); font-weight:600;">Oscuridad</span>
            <input type="range" id="opacitySlider" min="10" max="90" value="50" oninput="updateOpacity(this.value)">
            <span id="op-val" style="font-size:11px; color:var(--btn-cyan); font-weight:800;">50%</span>
        </div>
        
        <select id="fontSelect" onchange="updateFont(this.value)" style="margin-bottom: 10px;">
            <option value="serif">Fuente: Serif Elegante</option>
            <option value="arial">Fuente: Arial Black</option>
        </select>
        
        <select id="modeSelect" onchange="toggleMode(this.value)">
            <option value="preset">Modo: Preestablecido</option>
            <option value="manual">Modo: Manual</option>
        </select>
    </div>

    <div class="manual-box" id="manualBox">
        <textarea id="manualText" rows="4" placeholder="Escribe el versículo aquí..."></textarea>
        <input type="text" id="manualRef" placeholder="Referencia (Ej: JUAN 3:16)">
        <button class="btn-apply" onclick="applyManual()">APLICAR TEXTO</button>
    </div>

    <div class="section-title" id="list-title">VERSÍCULOS DISPONIBLES</div>
    <div class="verse-list" id="verseList">
        <!-- Lista de versículos dinámicos -->
    </div>
</div>

        },

    // ESTADO
    let state = { ver: 'RVR1960', cat: 'paz', theme: 'motores', verseKey: null };

    // INICIALIZACIÓN
    document.addEventListener("DOMContentLoaded", () => {
        renderImageOptions();
        renderVerses();
        
        document.getElementById('catSelect').value = 'paz';
        document.getElementById('themeSelect').value = 'motores';
        
        const firstV = verseDB.paz.RVR1960[0];
        selectVerseDOM(firstV.t, firstV.r, 'paz_RVR1960_0', 0);
    });

    // CONTROLADORES
    function setVersion(v, btn) {
        state.ver = v;
        document.querySelectorAll('.ver-tab').forEach(el => el.classList.remove('active'));
        btn.classList.add('active');
        renderVerses();
    }

    function setCat(c) {
        state.cat = c;
        renderVerses();
    }

    function setTheme(t) {
        state.theme = t;
        const imgSelect = document.getElementById('imgSelect');
        const customImgWrap = document.getElementById('customImgWrap');
        const imgTitle = document.getElementById('imgTitle');

        if (t === 'personalizada') {
            // Ocultar selectores normales y mostrar subida de imagen
            imgSelect.style.display = 'none';
            customImgWrap.style.display = 'block';
            imgTitle.innerText = 'CARGA TU IMAGEN';
            
            // Poner el fondo oscuro temporalmente hasta que suba la foto
            document.getElementById('verse-card').style.backgroundImage = 'none';
        } else {
            // Mostrar selectores normales
            imgSelect.style.display = 'block';
            customImgWrap.style.display = 'none';
            imgTitle.innerText = 'SELECCIONAR IMAGEN';
            renderImageOptions();
        }
    }

    // CARGA DE FOTO DESDE EL CELULAR
    function loadCustomImage(event) {
        const file = event.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                // Aplica la foto del usuario como fondo del versículo
                document.getElementById('verse-card').style.backgroundImage = `url('${e.target.result}')`;
            }
            reader.readAsDataURL(file);
        }
    }

    // CARGAR SELECTOR DE IMÁGENES PREDEFINIDAS
    function renderImageOptions() {
        if(state.theme === 'personalizada') return;

        const imgSelect = document.getElementById('imgSelect');
        imgSelect.innerHTML = ''; 
        
        imgDB[state.theme].forEach((img, idx) => {
            const opt = document.createElement('option');
            opt.value = idx;
            opt.innerText = img.name;
            imgSelect.appendChild(opt);
        });
        
        selectImageFromDropdown(0);
    }

    // CAMBIAR IMAGEN DE FONDO
    function selectImageFromDropdown(idx) {
        if(state.theme === 'personalizada') return;
        const imgUrl = imgDB[state.theme][idx].url;
        document.getElementById('verse-card').style.backgroundImage = `url('${imgUrl}')`;
    }

    // RENDERIZADO DE VERSÍCULOS 
    function renderVerses() {
        const list = document.getElementById('verseList');
        list.innerHTML = ''; 
        
        verseDB[state.cat][state.ver].forEach((v, idx) => {
            const key = `${state.cat}_${state.ver}_${idx}`;
            const isSent = localStorage.getItem(key);
            
            const item = document.createElement('div');
            item.className = `verse-item ${isSent ? 'sent' : ''} ${state.verseKey === key ? 'active' : ''}`;
            
            item.onclick = () => selectVerseDOM(v.t, v.r, key, idx);

            const refDiv = document.createElement('div');
            refDiv.className = 'verse-ref';
            refDiv.innerHTML = `${v.r} ${isSent ? '<span class="sent-mark">✓ ENVIADO</span>' : ''}`;
            
            const textDiv = document.createElement('div');
            textDiv.className = 'verse-text';
            textDiv.innerText = v.t; 

            item.appendChild(refDiv);
            item.appendChild(textDiv);
            list.appendChild(item);
        });
    }

    function selectVerseDOM(text, ref, key, idx) {
        document.getElementById('display-text').innerText = `"${text}"`;
        document.getElementById('display-ref').innerText = ref;
        state.verseKey = key;
        
        const items = document.querySelectorAll('.verse-item');
        items.forEach(i => i.classList.remove('active'));
        if(items[idx]) items[idx].classList.add('active');
    }

    // CONTROLES VISUALES
    function updateOpacity(val) {
        document.getElementById('overlay-bg').style.background = `rgba(0,0,0,${val/100})`;
        document.getElementById('op-val').innerText = `${val}%`;
    }

    function updateFont(val) {
        const card = document.getElementById('verse-card');
        if(val === 'arial') card.classList.add('font-arial');
        else card.classList.remove('font-arial');
    }

    function toggleMode(val) {
        const manualBox = document.getElementById('manualBox');
        const listTitle = document.getElementById('list-title');
        const verseList = document.getElementById('verseList');
        const catSelect = document.getElementById('catSelect');

        if(val === 'manual') {
            manualBox.style.display = 'block';
            listTitle.style.display = 'none';
            verseList.style.display = 'none';
            catSelect.style.display = 'none';
            state.verseKey = null; 
        } else {
            manualBox.style.display = 'none';
            listTitle.style.display = 'block';
            verseList.style.display = 'flex';
            catSelect.style.display = 'block';
            renderVerses();
        }
    }

    function applyManual() {
        const text = document.getElementById('manualText').value;
        const ref = document.getElementById('manualRef').value;
        if(text && ref) {
            document.getElementById('display-text').innerText = `"${text}"`;
            document.getElementById('display-ref').innerText = ref.toUpperCase();
        }
    }

    async function downloadImage() {
        const btn = document.querySelector('.btn-save');
        btn.innerHTML = '⏳ PROCESANDO...';
        
        try {
            const canvas = await html2canvas(document.getElementById('verse-card'), { 
                useCORS: true, 
                allowTaint: true,
                scale: 2 
            });
            const link = document.createElement('a');
            link.download = `PalabraDiaria_${Date.now()}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
            
            if(state.verseKey) {
                localStorage.setItem(state.verseKey, 'true');
                renderVerses(); 
            }
        } catch (err) {
            alert('Aviso: Algunos servidores de imágenes bloquean la descarga directa. Intenta hacer una captura de pantalla.');
            console.error(err);
        } finally {
            btn.innerHTML = '↓ GUARDAR IMAGEN';
        }
    }
</script>
</body>
</html>
